name: CI

on:
  push:
    branches: [main, dev, dev-*]
  pull_request:
    branches: [main]

env:
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  BRANCH: ${{ github.ref_name }}
  COMMIT_SHA: ${{ github.sha }}
  ACTOR: ${{ github.actor }}
  RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  ci:
    name: Build & Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check

      - name: Production build
        run: |
          cp svelte.config.prod.js svelte.config.js
          npm run build

      # TODO: Uncomment when Vitest is installed
      # - name: Test
      #   run: npm test

      - name: Telegram notification - Success
        if: success()
        run: |
          COMMIT_MSG=$(git log --format=%s -1 | tr '`' "'" | head -c 80)

          MESSAGE="✅ *Gruyere CI - Build Passed*

          All checks passed

          *Branch:* \`${BRANCH}\`
          *Commit:* \`${COMMIT_SHA:0:7}\` — ${COMMIT_MSG}
          *Author:* ${ACTOR}

          [View Run](${RUN_URL})"

          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}' |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @-

      - name: Telegram notification - Failure
        if: failure()
        run: |
          COMMIT_MSG=$(git log --format=%s -1 | tr '`' "'" | head -c 80)

          MESSAGE="❌ *Gruyere CI - Build Failed*

          Build or checks failed

          *Branch:* \`${BRANCH}\`
          *Commit:* \`${COMMIT_SHA:0:7}\` — ${COMMIT_MSG}
          *Author:* ${ACTOR}

          [View Run](${RUN_URL})"

          jq -n --arg chat_id "$TELEGRAM_CHAT_ID" --arg text "$MESSAGE" \
            '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: true}' |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" -d @-
